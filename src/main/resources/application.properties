#
# Trading Intelligence Platform — shared defaults (safe to commit)
# Secrets: copy application.properties.example → application-local.properties
#          and fill in your keys (file is gitignored).
#
spring.config.import=optional:classpath:application-local.properties

spring.application.name=Trading Intelligence Platform
spring.main.web-application-type=none
spring.main.allow-circular-references=true

# Database (SQLite) — P1 (LOG-FIX) hardened against [SQLITE_BUSY]:
#   journal_mode=WAL  : write-ahead log, allows concurrent reads + 1 writer
#   busy_timeout=5000 : drivers wait up to 5s for a lock instead of erroring immediately
#   synchronous=NORMAL: durable enough for desktop use, much faster commits
# Maximum pool size MUST be 1 with SQLite — multiple writer connections fight
# each other for the file lock and produce SQLITE_BUSY at random points.
spring.datasource.url=jdbc:sqlite:${user.home}/.trading-platform/trading.db?journal_mode=WAL&busy_timeout=5000&synchronous=NORMAL
spring.datasource.driver-class-name=org.sqlite.JDBC
# Dialect auto-detected from JDBC URL (SQLite or PostgreSQL via docker profile).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Single-writer pool for SQLite — see P1 fix above.
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.lifecycle.timeout-per-shutdown-phase=30s

# Mail (SMTP) — set credentials in application-local.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# API keys — blank = provider skipped; set in application-local.properties
api.alphavantage-key=
api.coingecko-key=
api.polygon-key=
api.marketstack-key=
api.finnhub-key=
# Finnhub key for SymbolSyncService stock symbol download and AiNewsService
app.api.finnhub.key=${api.finnhub-key:}
# AlphaVantage key alias for AiNewsService
app.api.alphavantage.key=${api.alphavantage-key:}
api.fred-key=
api.coinmarketcap-key=
api.openexchangerates-key=
api.exchangerateapi-key=
api.freecurrencyapi-key=
api.currencylayer-key=
api.fixerio-key=
api.twelvedata-key=

# AI / OpenAI settings — set app.api.openai.key in application-local.properties
# to enable real AI-powered news analysis in the AI tab.
# Leave blank to use rule-based fallback (no AI).
app.api.openai.key=
app.api.openai.model=gpt-4o-mini
app.api.openai.base-url=https://api.openai.com/v1

api.coingecko.base-url=https://api.coingecko.com/api/v3
api.binance.base-url=https://api.binance.com
api.binance.fallback-url=https://data-api.binance.vision
api.yahoo.base-url=https://query1.finance.yahoo.com
api.frankfurter.base-url=https://api.frankfurter.app

# HTTP timeouts — P3 (LOG-FIX): fail fast on bad networks. The circuit breaker
# in HttpJsonClient will skip dead endpoints instead of waiting 30+ seconds.
api.http.connect-timeout-sec=5
api.http.read-timeout-sec=10
api.http.retry-count=0

# Circuit breaker (P3 LOG-FIX): after N consecutive failures, a provider is
# skipped for `cooldown-sec` seconds; tune via -D flags for noisy networks.
api.circuit.failure-threshold=3
api.circuit.cooldown-sec=300

notification.email.to=

telegram.bot.enabled=false
telegram.bot.token=
telegram.bot.username=
telegram.bot.chat-ids=

app.chart.default-bars=200
app.chart.default-timeframe=1h
app.analysis.background-refresh-symbols=BTCUSDT,ETHUSDT,AAPL,EURUSD

app.alert.poll-interval-ms=10000

# Per-provider OHLCV tables (e.g. ETHUSDT_BINANCE_1h). Enabled automatically with docker profile.
app.market-data.dynamic-tables.enabled=false
app.market-data.sync.enabled=true
app.market-data.sync.default-bars=200
app.market-data.sync.bootstrap-on-miss=true

# Offline candle aggregation — runs every 15 minutes (900000 ms)
# Set to a larger value (e.g. 3600000 for 1h) on low-powered machines.
app.market-data.aggregation.delay-ms=900000
