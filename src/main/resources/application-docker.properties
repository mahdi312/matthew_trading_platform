#
# Activated with: SPRING_PROFILES_ACTIVE=docker
# Used by docker-compose and when connecting a host-run app to containerized Postgres.
#
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trading_platform}
spring.datasource.username=${POSTGRES_USER:trading}
spring.datasource.password=${POSTGRES_PASSWORD:trading}
spring.datasource.driver-class-name=org.postgresql.Driver
# PostgreSQL dialect is auto-detected from the JDBC URL above.
spring.jpa.hibernate.ddl-auto=update
# Harmless one-shot notices when ddl-auto=update reconciles indexes on first boot.
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

app.market-data.dynamic-tables.enabled=true
app.market-data.sync.enabled=true
