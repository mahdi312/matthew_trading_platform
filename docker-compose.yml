services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trading_pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: mahdi.mostafavi312@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-platform-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
    volumes:
      - ./src/main/resources/application-local.properties:/app/config/application-local.properties:ro
    # JavaFX desktop UI requires a display. For day-to-day use, run the app on the host
    # and keep only Postgres in Docker (see docs/DOCKER.md).

networks:
  app-network:

volumes:
  trading_pgdata:
